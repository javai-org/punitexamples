name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        java-version: ['21']

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Compile
        run: ./gradlew compileJava compileTestJava

      - name: Run tests
        # Many tests are expected to fail — they demonstrate PUnit features
        # (budget exhaustion, exception handling, infeasible configs, etc.).
        # Successful compilation is the key compatibility indicator.
        run: ./gradlew test --continue || true

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-java-${{ matrix.java-version }}
          path: |
            */build/reports/tests/
            */build/test-results/
          retention-days: 14
